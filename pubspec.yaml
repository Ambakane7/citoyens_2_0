name: CITOYENS_2_0
description: "Une application de signalisation des incidents au Mali développée par Women Tech."

publish_to: 'none'

version: 1.0.0+9

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  collection: ^1.19.0
  provider: ^6.1.5
  intl: ^0.20.2
  http: ^1.2.1

  # UI
  lottie: ^3.3.1
  carousel_slider: ^5.1.1
  smooth_page_indicator: ^2.0.1
  flutter_markdown: ^0.7.7+1

  # Firebase
  firebase_core: ^4.11.0
  firebase_auth: ^6.5.4
  cloud_firestore: ^6.6.0
  firebase_messaging: ^16.4.1

  # Local
  shared_preferences: ^2.5.5

  # Maps
  flutter_map: ^8.2.2
  geolocator: ^14.0.2
  latlong2: ^0.9.1

  # Images
  image_picker: ^1.2.1

  # Country picker
  country_picker: ^2.0.27

  # URLs
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4
  launcher_name: ^1.0.2

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "lib/images/logo_ios.png"
  remove_alpha_ios: true
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "lib/images/logo.png"

launcher_name:
  name: "CITOYENS 2.0"

flutter:
  uses-material-design: true

  assets:
    - lib/images/